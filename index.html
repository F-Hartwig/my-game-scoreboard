<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ScoreBuddy</title>
    <link rel="stylesheet" href="/style.css">
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%231e1b4b'/%3E%3Crect x='10' y='10' width='80' height='80' rx='18' fill='none' stroke='%234f46e5' stroke-width='2.5'/%3E%3Ctext x='50' y='63' font-family='Arial Black, Impact, sans-serif' font-size='34' font-weight='900' fill='%23ffffff' text-anchor='middle' letter-spacing='-1.5'%3ESB%3C/text%3E%3C/svg%3E">
    <link rel="apple-touch-icon" sizes="180x180" href="/icon.png">
</head>
<body>

<div class="header">
    <h1 id="headerTitle">🎲 Scoreboard</h1>
</div>

<div id="gamePage" class="page active">
    <div id="gameContent"></div>
</div>

<div id="playersPage" class="page">
    <div class="card">
        <div class="title">👥 Spieler hinzufügen</div>
        <div style="display: flex; gap: 8px;">
            <input id="playerInput" placeholder="Name...">
            <button style="width: 48px; font-size: 20px; flex-shrink: 0;" onclick="addPlayer()">+</button>
        </div>
    </div>
    <div id="playersList"></div>
</div>

<div id="statsPage" class="page">
    <div class="card" style="padding: 16px 14px;">
        <div class="title">🏆 Bestenliste</div>
        <div id="ranking" class="ranking-list"></div>
    </div>
    <div class="card" style="padding: 16px 14px;">
        <div class="title">📜 Historie</div>
        <div id="history" class="history-list"></div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item active" onclick="navigate('gamePage', this)"><span>🎮</span>Spiel</div>
    <div class="nav-item" onclick="removeSyncBlockAndNavigate('playersPage', this)"><span>👥</span>Spieler</div>
    <div class="nav-item" onclick="removeSyncBlockAndNavigate('statsPage', this)"><span>🏆</span>Statistik</div>
</div>

<div class="modal-overlay" id="appModal" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
        <h3 class="title" id="modalTitle">✏️ Bearbeiten</h3>
        <div id="modalBody"></div>
        <div style="display: flex; gap: 8px; margin-top: 16px;" id="modalActions"></div>
    </div>
</div>

<script src="/config.js"></script>
<script src="/api.js"></script>
<script src="/app.js"></script>
</body>
</html>
